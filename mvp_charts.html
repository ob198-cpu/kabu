const colors = { "8058.T":"#1f6f8b", "2802.T":"#17815a", "8306.T":"#c76a13", "6857.T":"#b83232", nikkei:"#5b6b7c", nasdaq:"#7c3aed", sp500:"#0f766e" };
const defaultOn = new Set(["8058.T","2802.T","nikkei","nasdaq"]);
const controls = document.getElementById('controls');
for (const key of Object.keys(series)) {
  const label = document.createElement('label');
  label.innerHTML = '<input type="checkbox" value="'+key+'" '+(defaultOn.has(key)?'checked':'')+'> '+key;
  controls.appendChild(label);
}
controls.addEventListener('change', draw);
function selected(){ return [...controls.querySelectorAll('input:checked')].map(x=>x.value); }
function draw(){
  const svg = document.getElementById('chart');
  svg.innerHTML = '';
  const keys = selected();
  const pad = {l:60,r:20,t:25,b:45}, W=1100, H=520, w=W-pad.l-pad.r, h=H-pad.t-pad.b;
  const points = keys.flatMap(k => series[k].map(d => d.index));
  const min = Math.floor((Math.min(...points)-5)/5)*5 || 80;
  const max = Math.ceil((Math.max(...points)+5)/5)*5 || 120;
  const dates = series[keys[0]] || [];
  const x = i => pad.l + (i / Math.max(1, dates.length-1)) * w;
  const y = v => pad.t + (max-v)/(max-min)*h;
  for(let g=min; g<=max; g+=10){
    svg.insertAdjacentHTML('beforeend','<line x1="'+pad.l+'" y1="'+y(g)+'" x2="'+(W-pad.r)+'" y2="'+y(g)+'" stroke="#e5edf5"/>');
    svg.insertAdjacentHTML('beforeend','<text x="12" y="'+(y(g)+4)+'" font-size="12" fill="#5f7085">'+g+'</text>');
  }
  for (const key of keys) {
    const arr = series[key];
    const d = arr.map((p,i)=>(i?'L':'M')+x(i)+' '+y(p.index)).join(' ');
    svg.insertAdjacentHTML('beforeend','<path d="'+d+'" fill="none" stroke="'+(colors[key]||'#111')+'" stroke-width="2.4"/>');
    const last = arr[arr.length-1];
    svg.insertAdjacentHTML('beforeend','<text x="'+(W-pad.r-90)+'" y="'+y(last.index)+'" font-size="13" font-weight="700" fill="'+(colors[key]||'#111')+'">'+key+' '+last.index+'</text>');
  }
  svg.insertAdjacentHTML('beforeend','<line x1="'+pad.l+'" y1="'+y(100)+'" x2="'+(W-pad.r)+'" y2="'+y(100)+'" stroke="#172033" stroke-dasharray="4 4"/>');
  renderSummary(keys);
}
function renderSummary(keys){
  const rows = [['対象','開始=100','現在指数','1年騰落']].concat(keys.map(k=>{
    const a=series[k]; const last=a[a.length-1]; return [k,'100',last.index,(last.index-100).toFixed(2)+'%'];
  }));
  document.getElementById('summary').innerHTML = rows.map((r,i)=>'<tr>'+r.map(c=>i?'<td>'+c+'</td>':'<th>'+c+'</th>').join('')+'</tr>').join('');
}
draw();
</script>
